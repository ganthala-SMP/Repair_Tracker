{% extends 'base.html' %}
{% block content %}
<div class='card'>
  <h1>{{ code }}</h1>
  <h2>{{ title }}</h2>
  <p>{{ message }}</p>
  <p><a href="{{ url_for('login' if not current_user.is_authenticated else ('super_admin_dashboard' if current_user.is_authenticated and current_user.is_super_admin else 'dashboard')) }}">Go back</a></p>
</div>
{% endblock %}
